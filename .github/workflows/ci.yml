name: CI

# Gate every collaborator PR + push to main on: the generator compiles, source stays
# pure ASCII, and it still produces a well-formed overlay from the committed fixtures.
# All GPU-free -- runs on GitHub-hosted runners (no rocprofv3, no board needed).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile modules
        run: python -m py_compile rocprof_unified_viewer.py serve.py disasm_loadwidth.py

      - name: ASCII purity check
        # Core generator + tooling + tests must stay ASCII (hard repo rule). The
        # docs/annotate_*.py helpers are excluded -- they are non-functional legacy
        # image-annotation scripts that intentionally embed unicode label glyphs.
        run: |
          if grep -rnP '[^\x00-\x7f]' --include='*.py' \
               rocprof_unified_viewer.py serve.py disasm_loadwidth.py \
               isa_glossary.py tests/; then
            echo "::error::non-ASCII bytes found (these files are ASCII-only)"
            exit 1
          fi

      - name: Install pytest
        run: python -m pip install --quiet pytest

      - name: Run tests (lint + smoke-gen on fixtures)
        run: python -m pytest tests/ -q
